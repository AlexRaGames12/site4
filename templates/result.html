<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваш отзыв готов | Адванта-М Сибирь</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #059669 0%, #1e3a8a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .success-icon { font-size: 60px; text-align: center; margin-bottom: 20px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }
        .review-box {
            background: #f0fdf4;
            border-left: 4px solid #059669;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .review-text { 
            font-size: 18px; 
            line-height: 1.5; 
            color: #065f46; 
            font-style: italic; 
            white-space: pre-line;
        }
        .quote-mark { font-size: 30px; color: #059669; opacity: 0.5; }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .map-btn {
            flex: 1;
            padding: 14px;
            border-radius: 50px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .map-btn.ya {
            background: #ffcc00;
            color: #1a1a1a;
            border: none;
        }
        .map-btn.ya:hover {
            background: #e6b800;
            transform: scale(1.02);
        }
        .map-btn.gis {
            background: #059669;
            color: white;
            border: none;
        }
        .map-btn.gis:hover {
            background: #047857;
            transform: scale(1.02);
        }
        .copy-btn {
            background: white;
            color: #059669;
            border: 2px solid #059669;
            cursor: pointer;
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
        }
        .copy-btn:hover {
            background: #059669;
            color: white;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #059669 0%, #1e3a8a 100%);
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 10px;
        }
        .btn:hover { transform: scale(1.02); }
        @media (max-width: 600px) {
            .card { padding: 20px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="success-icon">✅</div>
            <h2>Отзыв готов!</h2>
            <p class="subtitle">Остался последний шаг</p>
            
            <div class="review-box">
                <div class="quote-mark">«</div>
                <div class="review-text">{{ review }}</div>
                <div class="quote-mark" style="text-align: right;">»</div>
            </div>
            
            <div class="action-buttons">
                <a href="https://yandex.ru/maps/org/advanta_m_sibir/120338846725/reviews/?ll=82.804645%2C55.014726&z=16" 
                   target="_blank" 
                   class="map-btn ya">
                    📍 Яндекс.Карты
                </a>
                <a href="https://2gis.ru/irkutsk/firm/70000001099169402/tab/reviews?m=104.162329%2C52.365403%2F20" 
                   target="_blank" 
                   class="map-btn gis">
                    🗺 2ГИС
                </a>
            </div>
            
            <div style="text-align: center; margin-bottom: 20px; font-size: 14px; color: #64748b;">
                ⚡ Нажмите на кнопку, скопируйте отзыв и вставьте его на страницу
            </div>
            
            <button class="copy-btn" onclick="copyReview()">
                📋 Скопировать отзыв
            </button>
            
            <a href="/" class="btn" style="margin-top: 10px; text-align: center;">✍️ Написать ещё один отзыв</a>
        </div>
    </div>
    
    <script>
        function copyReview() {
            const reviewText = `{{ review }}`;
            navigator.clipboard.writeText(reviewText).then(() => {
                alert("✅ Отзыв скопирован! Теперь вставьте его на страницу отзывов.");
            }).catch(() => {
                alert("❌ Не удалось скопировать. Скопируйте отзыв вручную.");
            });
        }
    </script>
</body>
</html>
